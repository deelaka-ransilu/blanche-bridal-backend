spring:
  application:
    name: blanche-bridal

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

jwt:
  expiration: 86400000

app:
  frontend-url: http://localhost:3000

payhere:
  merchant-id: ${PAYHERE_MERCHANT_ID}
  secret: ${PAYHERE_SECRET}
  sandbox: true
  return-url: http://localhost:3000/checkout/success
  cancel-url: http://localhost:3000/checkout/cancel
  notify-url: ${PAYHERE_NOTIFY_URL:http://localhost:8080/api/payments/notify}